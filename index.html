<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karate Score - Kata</title>
    <link rel="shortcut icon" href="logo.png" type="image/x-icon">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #2256F2;
            
        }
        #back {
            background-image: url(logo12.png);
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: 30%;
            background-position: center;
            padding-bottom: 50px; /* Added padding to see content below background */
        }
        .navbar {
            background-color: #ffffff;
        }
        .navbar-brand img {
            height: 3.5rem;
        }
        .marquee-container {
            font-size: 3rem;
            font-weight: bold;
            flex-grow: 1;
            text-align: center;
        }
        .spacing#left, .spacing#right {
            flex-grow: 1;
            margin-left: 200PX;
        }
        .header-bar {
            padding: 0.5rem 1rem;
            font-family: Arial, sans-serif;
            font-size: 1.75rem;
            background-color: #F21616;
            color: white;
            text-align: center;
        }
        .form-label {
            font-family: Arial, sans-serif;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffffff;
        }
        .form-control {
            text-align: center;
            font-weight: bold;
            font-size: 1.25rem;
        }
        .btn-custom {
            font-size: 1.5rem;
        }
        .footer {
            padding: 0.5rem 1rem;
            font-family: Arial, sans-serif;
            font-size: 1rem;
            font-variant: small-caps;
            background-color: #2256F2;
            color: white;
            text-align: center;
        }
input:hover ,button:hover {
  box-shadow: 0px 0px 10px #433f3f;
  transform: scale(1.02);
  transition: 0.15s ease-in-out;
}
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar navbar-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <img src="logo.png" alt="Logo">
            </a>
            <div class="spacing" id="left"></div>
            <div class="marquee-container">
                <marquee behavior="alternate">WSKF INDIA</marquee>
            </div>
            <div class="spacing" id="right"></div>
            <a href="kumite1.html" class="btn btn-primary">Kumite Score Board</a>
        </div>
    </nav>

    <!-- Header -->
    <div class="header-bar">
        <h1>KATA SCOREBOARD</h1>
    </div>

    <div class="container mt-4">
        <div id="back">
            <div class="text-center mb-4">
                <label id="hed" class="form-label"><u>SCORE</u></label>
            </div>

            <!-- Score Inputs -->
            <div class="row justify-content-center g-2">
                <div class="col-sm-4 col-md-2">
                    <input type="number" class="form-control" id="judge1" placeholder="Judge 1" maxlength="2" onKeyup="autotab(this, document.getElementById('judge2'))">
                </div>
                <div class="col-sm-4 col-md-2">
                    <input type="number" class="form-control" id="judge2" placeholder="Judge 2" maxlength="2" onKeyup="autotab(this, document.getElementById('judge3'))">
                </div>
                <div class="col-sm-4 col-md-2">
                    <input type="number" class="form-control" id="judge3" placeholder="Judge 3" maxlength="2" onKeyup="autotab(this, document.getElementById('judge4'))">
                </div>
                <div class="col-sm-4 col-md-2">
                    <input type="number" class="form-control" id="judge4" placeholder="Judge 4" maxlength="2" onKeyup="autotab(this, document.getElementById('judge5'))">
                </div>
                <div class="col-sm-4 col-md-2">
                    <input type="number" class="form-control" id="judge5" placeholder="Judge 5" maxlength="2" onKeyup="autoclick(this)">
                </div>
            </div>

            <!-- Controls and Total Score -->
            <div class="text-center mt-5">
                <label id="hed" class="form-label">Total Score</label><br><br>
                <div class="row justify-content-center align-items-center g-3">
                    <div class="col-auto">
                        <input type="reset" class="btn btn-secondary btn-lg btn-custom" value="RESET" onclick="window.location.reload()">
                    </div>
                    <div class="col-4 col-md-3">
                        <input type="number" class="form-control form-control-lg" id="Total" readonly>
                    </div>
                    <div class="col-auto">
                        <input type="submit" class="btn btn-danger btn-lg btn-custom" value="DISPLAY" id="click" onclick="check();">
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Footer -->
    <footer class="footer fixed-bottom">
        <i>developed by</i><b>&nbsp;&nbsp; Daksha Karate Club </b>
    </footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Your Custom JavaScript -->
    <script type="text/javascript">
        function check() {
            var a = parseFloat(document.getElementById("judge1").value) || 0;
            var b = parseFloat(document.getElementById("judge2").value) || 0;
            var c = parseFloat(document.getElementById("judge3").value) || 0;
            var d = parseFloat(document.getElementById("judge4").value) || 0;
            var e = parseFloat(document.getElementById("judge5").value) || 0;

            if (a > 10) a /= 10;
            if (b > 10) b /= 10;
            if (c > 10) c /= 10;
            if (d > 10) d /= 10;
            if (e > 10) e /= 10;

            var num = [a, b, c, d, e].filter(val => !isNaN(val));
            if (num.length < 3) {
                document.getElementById("Total").value = "N/A";
                return;
            }

            const arrMax = Math.max(...num);
            const arrMin = Math.min(...num);
            
            const sum = num.reduce((acc, val) => acc + val, 0) - arrMin - arrMax;
            const finalScore = sum;

            document.getElementById("Total").value = finalScore.toFixed(2);
            
            // Display final score in a larger view
            document.body.innerHTML = `<div style="display: flex; align-items: center; justify-content: center; font-size: 20vw; width: 100vw; height: 100vh; margin: 0; background-color: #0AAEF6; color: white;">${finalScore.toFixed(2)}</div>`;
        }

        function autotab(current, to) {
            if (current.value.length >= current.getAttribute("maxlength")) {
                let val = current.value;
                if (val.length > 1 && !val.includes('.')) {
                    current.value = val.slice(0, 1) + '.' + val.slice(1);
                }
                to.focus();
            }
        }

        function autoclick(current) {
            if (current.value.length >= current.getAttribute("maxlength")) {
                let val = current.value;
                 if (val.length > 1 && !val.includes('.')) {
                    current.value = val.slice(0, 1) + '.' + val.slice(1);
                }
                document.getElementById("click").click();
            }
        }
    </script>
</body>
</html>
